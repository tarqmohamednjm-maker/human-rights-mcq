<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الاسئلة - حقوق الإنسان</title>
    <!-- Tabler Icons (used for the shuffle button) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="qwrap">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">اختبار حقوق الإنسان ومكافحة الفساد</h2>
  <div class="qhead">
    <span class="qtitle">حقوق الإنسان ومكافحة الفساد</span>
    <span class="qmeta" id="qmeta"></span>
  </div>
  <div class="qprog"><div class="qprog-fill" id="qprog"></div></div>
  <div id="quiz-area"></div>
  <div class="qbtns">
    <button class="qbtn" id="prev-btn" onclick="go(-1)">&#8594; السابق</button>
    <button class="qbtn" id="shuffle-btn" onclick="shuffleAll()"><i class="ti ti-arrows-shuffle" aria-hidden="true"></i> خلط الأسئلة</button>
    <button class="qbtn" id="next-btn" onclick="go(1)">التالي &#8592;</button>
  </div>
</div>

<!-- External JavaScript -->
<script src="scripts/script.js"></script>
</body>
</html>
